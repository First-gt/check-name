<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="ระบบบันทึกสถิติการมาเรียน — บันทึกการเข้าเรียนของนักเรียนได้อย่างรวดเร็วและสะดวก" />
  <title>ระบบบันทึกสถิติการมาเรียน</title>

  <!-- Google Fonts: Noto Sans Thai + Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="attendance.css" />
</head>
<body>

  <!-- Background decoration -->
  <div class="bg-blob blob-1" aria-hidden="true"></div>
  <div class="bg-blob blob-2" aria-hidden="true"></div>

  <main class="page-wrapper">

    <!-- Header -->
    <header class="page-header">
      <div class="header-icon" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
      </div>
      <div class="header-text">
        <h1 class="header-title">ระบบบันทึกการมาเรียน</h1>
        <p class="header-subtitle">Attendance Management System</p>
      </div>
    </header>

    <!-- Form Card -->
    <div class="form-card">

      <!-- Section: วันที่และข้อมูลห้องเรียน -->
      <section class="form-section">
        <h2 class="section-title">
          <span class="section-icon" aria-hidden="true">📅</span>
          ข้อมูลวันที่และห้องเรียน
        </h2>

        <div class="form-grid form-grid-2">
          <!-- Date -->
          <div class="form-group">
            <label for="attDate" class="form-label">
              วันที่บันทึก
              <span class="required-mark" aria-label="จำเป็นต้องกรอก">*</span>
            </label>
            <input
              type="date"
              id="attDate"
              class="form-input"
              required
              aria-required="true"
            />
          </div>

          <!-- Classroom -->
          <div class="form-group">
            <label for="classroom" class="form-label">
              ชั้นเรียน
              <span class="required-mark" aria-label="จำเป็นต้องกรอก">*</span>
            </label>
            <input
              type="text"
              id="classroom"
              class="form-input"
              value="อนุบาล 2"
              placeholder="ระบุชั้นเรียน"
              required
              aria-required="true"
            />
          </div>
        </div>

        <!-- Teacher Name -->
        <div class="form-group">
          <label for="teacherName" class="form-label">
            ชื่อครูประจำชั้น
            <span class="required-mark" aria-label="จำเป็นต้องกรอก">*</span>
          </label>
          <div class="input-wrapper">
            <span class="input-icon" aria-hidden="true">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
              </svg>
            </span>
            <input
              type="text"
              id="teacherName"
              class="form-input has-icon"
              placeholder="ชื่อ-นามสกุล ครูประจำชั้น"
              required
              aria-required="true"
            />
          </div>
        </div>
      </section>

      <div class="section-divider" aria-hidden="true"></div>

      <!-- Section: ข้อมูลนักเรียน -->
      <section class="form-section">
        <h2 class="section-title">
          <span class="section-icon" aria-hidden="true">🎒</span>
          ข้อมูลนักเรียน
        </h2>

        <div class="form-grid form-grid-2">
          <!-- Student ID -->
          <div class="form-group">
            <label for="studentId" class="form-label">
              รหัสนักเรียน
              <span class="required-mark" aria-label="จำเป็นต้องกรอก">*</span>
            </label>
            <div class="input-wrapper">
              <span class="input-icon" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/>
                </svg>
              </span>
              <input
                type="text"
                id="studentId"
                class="form-input has-icon"
                placeholder="เช่น 6701001"
                required
                aria-required="true"
              />
            </div>
          </div>

          <!-- Attendance Status -->
          <div class="form-group">
            <label for="attStatus" class="form-label">
              สถานะการมาเรียน
              <span class="required-mark" aria-label="จำเป็นต้องกรอก">*</span>
            </label>
            <div class="select-wrapper">
              <select id="attStatus" class="form-select" required aria-required="true">
                <option value="มา">✅ มา</option>
                <option value="ขาด">❌ ขาด</option>
                <option value="ลา">📋 ลา</option>
                <option value="สาย">⏰ สาย</option>
              </select>
              <span class="select-arrow" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="6 9 12 15 18 9"/>
                </svg>
              </span>
            </div>
          </div>
        </div>

        <!-- Student Name -->
        <div class="form-group">
          <label for="studentName" class="form-label">
            ชื่อ-นามสกุล นักเรียน
            <span class="required-mark" aria-label="จำเป็นต้องกรอก">*</span>
          </label>
          <div class="input-wrapper">
            <span class="input-icon" aria-hidden="true">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
              </svg>
            </span>
            <input
              type="text"
              id="studentName"
              class="form-input has-icon"
              placeholder="ชื่อ-นามสกุล นักเรียน"
              required
              aria-required="true"
            />
          </div>
        </div>

        <!-- Gender Radio Buttons -->
        <div class="form-group">
          <fieldset class="gender-fieldset">
            <legend class="form-label">เพศ</legend>
            <div class="radio-group" role="radiogroup" aria-label="เพศ">
              <label class="radio-option" for="genderMale">
                <input
                  type="radio"
                  id="genderMale"
                  name="gender"
                  value="ชาย"
                  class="radio-input"
                  checked
                />
                <span class="radio-custom" aria-hidden="true"></span>
                <span class="radio-icon">👦</span>
                <span class="radio-label">ชาย</span>
              </label>

              <label class="radio-option" for="genderFemale">
                <input
                  type="radio"
                  id="genderFemale"
                  name="gender"
                  value="หญิง"
                  class="radio-input"
                />
                <span class="radio-custom" aria-hidden="true"></span>
                <span class="radio-icon">👧</span>
                <span class="radio-label">หญิง</span>
              </label>
            </div>
          </fieldset>
        </div>
      </section>

      <!-- Submit Button -->
      <div class="submit-wrapper">
        <button
          type="button"
          id="submitBtn"
          class="submit-btn"
          onclick="sendData()"
          aria-label="บันทึกข้อมูลการมาเรียน"
        >
          <span class="btn-icon" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
              <polyline points="17 21 17 13 7 13 7 21"/>
              <polyline points="7 3 7 8 15 8"/>
            </svg>
          </span>
          <span id="btnText">บันทึกข้อมูล</span>
        </button>
      </div>

    </div><!-- /.form-card -->

    <!-- Toast Notification -->
    <div id="toast" class="toast" role="alert" aria-live="polite" aria-atomic="true">
      <span class="toast-icon" id="toastIcon" aria-hidden="true"></span>
      <span id="toastMsg"></span>
    </div>

    <footer class="page-footer">
      <p>&copy; 2026 ระบบบันทึกการมาเรียน &mdash; Attendance Management System</p>
    </footer>

  </main>

  <script src="attendance.js"></script>
</body>
</html>
